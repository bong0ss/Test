{% extends 'master.html' %}

{% block title %}
    Proface adress translator
{% endblock %}

{% block content %}
<h1>Proface adress translator</h1>
<form action="{% url 'pf_ad_trans' %}" method="POST" id="pf_ad_trans">
    {% csrf_token %}
    <table>
        <tr>
            <th>Start PLC:</th>
            <th>Start PROFACE:</th>
        </tr>
        <tr>
            <th><input type="tel" id="start_dbw" min="0" maxlength="4" size="8" placeholder="START DBW" oninput="this.value = this.value.replace(/[^0-9]/g, String())"></th>
            <th><input type="tel" id="start_ls" min="0" maxlength="4" size="8" placeholder="START LS" oninput="this.value = this.value.replace(/[^0-9]/g, String())"></th>
        </tr>
        <tr>
            <th>
                <h3>PLC → PROFACE</h3>
                <button type="button" onclick="plc_add_w()">WORD</button>
                <button type="button" onclick="plc_add_wb()">WORD+BIT</button><br>
            </th>
            <th>
                <h3>PROFACE → PLC</h3>
                <button type="button" onclick="proface_add_w()">WORD</button>
                <button type="button" onclick="proface_add_wb()">WORD+BIT</button><br>
            </th>
        </tr>
        <tr>
            <th id="plc_th"></th>
            <th id="proface_th"></th>
        </tr>
    </table>
    <br><br><button type="button" onclick="submitData()">Submit</button>
</form>
<p id="resultp" style="width: 5%; margin-left: auto; margin-right: auto; text-align: left;"></p>
<script>
var id = 0
function plc_add_w()
{
    document.getElementById("plc_th").insertAdjacentHTML('beforeend', '<a id="' + id +'">WORD: <input type="tel" name="word" min="0" maxlength="4" size="3" placeholder="W" oninput="this.value = this.value.replace(/[^0-9]/g, String())"><button type="button" onclick="deleteField(this.parentElement.id)">-</button><br></a>')
    id += 1
}
function plc_add_wb()
{
    document.getElementById("plc_th").insertAdjacentHTML('beforeend', '<a id="' + id +'">WORD+BIT: <input type="tel" name="word" min="0" maxlength="4" size="3" placeholder="W" oninput="this.value = this.value.replace(/[^0-9]/g, String())"> <input type="tel" name="bit" min="0" max="7" maxlength="1" size="1" placeholder="B" pattern="[0-9]{0,7}" oninput="this.value = this.value.replace(/[^0-9]/g, String())"><button type="button" onclick="deleteField(this.parentElement.id)">-</button><br></a>')
    id += 1
}
function proface_add_w()
{
    document.getElementById("proface_th").insertAdjacentHTML('beforeend', '<a id="' + id +'">WORD: <input type="tel" name="word" min="0" maxlength="4" size="3" placeholder="W" oninput="this.value = this.value.replace(/[^0-9]/g, String())"><button type="button" onclick="deleteField(this.parentElement.id)">-</button><br></a>')
    id += 1
}
function proface_add_wb()
{
    document.getElementById("proface_th").insertAdjacentHTML('beforeend', '<a id="' + id +'">WORD+BIT: <input type="tel" name="word" min="0" maxlength="4" size="3" placeholder="W" oninput="this.value = this.value.replace(/[^0-9]/g, String())"> <input type="tel" name="bit" min="0" max="15" maxlength="2" size="2" placeholder="B" pattern="[0-9]{0,15}" oninput="this.value = this.value.replace(/[^0-9]/g, String())"><button type="button" onclick="deleteField(this.parentElement.id)">-</button><br></a>')
    id += 1
}
function submitData()
{
    var data_to_submit = {"plc": {}, "proface": {}};
    var start_dbw = document.getElementById("start_dbw").value;
    var start_ls = document.getElementById("start_ls").value;
    if(start_dbw == "" || start_ls == ""){alert("Start PLC and Start Proface can't be empty!"); return}
    if (document.getElementById("plc_th").querySelector("input") != null)
    {
        for (var element of document.getElementById("plc_th").querySelectorAll("input"))
        {
            let key = element.parentElement.id
            let key2 = element.name
            if (!data_to_submit["plc"][key]) {data_to_submit["plc"][key] = [];}
            if (element.value == "")
            {
                alert("Delete or fill empty fields!");
                return;
            }
            else if (element.name == "bit" && parseInt(element.value, 10) > 7 || parseInt(element.value, 10) < 0)
            {
                alert("Bit must be in range 0..7!");
                return;
            }
            else if (element.name == "word" && parseInt(element.value, 10) < start_dbw)
            {
                alert("Byte address is before mapping start!");
                return;
            }
            else
            {
                let item = {}
                item[key2]=element.value
                data_to_submit["plc"][key].push(item)
            }
        }
    }
    if (document.getElementById("proface_th").querySelector("input") != null)
    {
        for (var element of document.getElementById("proface_th").querySelectorAll("input"))
        {
            let key = element.parentElement.id
            let key2 = element.name
            if(!data_to_submit["proface"][key]) {data_to_submit["proface"][key] = [];}
            if (element.value == "")
            {
                alert("Delete or fill empty fields!");
                return;
            }
            else if (element.name == "bit" && parseInt(element.value, 10) > 15 || parseInt(element.value, 10) < 0)
            {
                alert("Bit must be in range 0..15!");
                return;
            }
            else if (element.name == "word" && parseInt(element.value, 10) < start_ls)
            {
                alert("LS address is before mapping start!");
                return;
            }
            else
            {
                let item = {}
                item[key2]=element.value
                data_to_submit["proface"][key].push(item)
            }
        }
        
    }
    sendData(data_to_submit, start_dbw, start_ls)
}
function deleteField(the_id)
{
    document.getElementById(the_id).remove()
    id-=1
}
function sendData(dataToSubmit, startDBW, startLS, function_type)
{
    fetch('', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
    body: JSON.stringify({intData: dataToSubmit, startdbw: startDBW, startls: startLS})}).then(response => response.json())
    .then(result => {if(result.status === 'success'){showResults(result.values)}})
}
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
function showResults(values)
{ 
    var text = ""
    for(var i of Object.values(JSON.parse(values)))
    {
        text += "<li>" + i + "</li>"
    }
    document.getElementById("resultp").innerHTML = "<br><center><h3>Results:</h3></center><ul style='list-style-type: none;'>" + text + "</ul>";
}
</script>
{% endblock %}
