{% extends 'master.html' %}

{% block title %}
    Task Logs
{% endblock %}

{% block content %}
<p style="width: 50%; text-align: left; margin-left: auto; margin-right: auto; font-size: 120%; line-height: 120%;">
    {% if logs %}
        {% for line in logs %}
            {{ line }}<br>
        {% endfor %}
    {% else %}
        <center>No Avaliable Logs</center>
    {% endif %}
</p>
<p><a href="{% url 'task_details' task_id %}">Go Back</a></p>

<script>
    setInterval(() => {
        window.location.reload()
    }, 1000);
</script>
{% endblock %}
