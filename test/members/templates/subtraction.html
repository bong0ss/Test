{% extends 'master.html' %}

{% block title %}
    Subtracting
{% endblock %}

{% block content %}
    <h1>Subtracting Function</h1>
    <form action="{% url 'subtraction' %}" method="POST">
        {% csrf_token %}
        <input type="number" name="num1" value="0" required><br>
        <input type="number" name="num2" value="0" required><br>
        <button type="submit">Subtract</button>
    </form>
    <p>Sub = {{ x }}</p>
    <p><a href="{% url 'customfunctions' %}">Go Back </a></p>
{% endblock %}
